<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- No background rect. The original favicon baked in a #00061a square
       so the glyph would read on any host; the panel header has its own
       dark navy background so the rect was redundant and made the glyph
       look like it was sitting on a separate tile. This variant is the
       circle + dot only — transparent background. -->
  <circle cx="128.0" cy="128.0" r="102.4" fill="none"
          stroke="#B14AFF" stroke-width="15.36"/>
  <circle cx="128.0" cy="128.0" r="25.6" fill="#FFE13B"/>
</svg>
